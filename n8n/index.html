<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>n8n Scraper UI</title>

  <style>
    body {
      font-family: Arial;
      max-width: 800px;
      margin: 40px auto;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
    }

    button {
      padding: 10px 20px;
      cursor: pointer;
    }

    pre {
      background: #f4f4f4;
      padding: 15px;
      overflow-x: auto;
    }
  </style>
</head>
<body>

<h2>Scraper Tool (n8n)</h2>

<label>Target URL:</label>
<input id="urlInput" placeholder="https://example.com" />

<label>Fields (comma separated):</label>
<input id="fieldsInput" placeholder="Book name, Price, Availability" />

<button onclick="sendRequest()">Scrape</button>

<h3>Output:</h3>
<pre id="output">Waiting...</pre>

<script>
async function sendRequest() {
  const url = document.getElementById("urlInput").value;
  const fields = document.getElementById("fieldsInput").value
    .split(",")
    .map(f => f.trim());

  const payload = {
    parameters: {
      url: url,
      fields: fields
    }
  };

  const outputBox = document.getElementById("output");
  outputBox.textContent = "Loading...";

  try {
    const response = await fetch("https://slegendz.app.n8n.cloud/webhook-test/scrape", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(payload)
    });

    const data = await response.json();

    // Pretty print JSON
    outputBox.textContent = JSON.stringify(data, null, 2);

  } catch (error) {
    outputBox.textContent = "Error: " + error;
  }
}
</script>

</body>
</html>
